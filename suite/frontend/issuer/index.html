<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fikua Lab — Issuer</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/" class="nav-brand">
                <span class="nav-logo">F</span>
                <span class="nav-name">Fikua Lab</span>
            </a>
            <div class="nav-links">
                <span class="nav-label">Issuer</span>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <main>
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="issue">Issue</button>
            <button class="tab" data-tab="records">Records</button>
        </div>

        <!-- Tab: Issue -->
        <section id="tab-issue">
            <!-- Step 1: Credential selector -->
            <div id="step-select" class="step">
                <div class="step-header">
                    <div class="step-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    </div>
                    <div>
                        <h2>Select Credential</h2>
                        <p class="step-sub">Choose a credential configuration to issue</p>
                    </div>
                </div>
                <div id="config-grid" class="config-grid">
                    <div class="spinner-wrap"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Step 2: Form -->
            <div id="step-form" class="step hidden">
                <div class="step-header">
                    <button id="btn-back-select" class="btn-icon" aria-label="Back">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    </button>
                    <div>
                        <h2 id="form-title">Credential Details</h2>
                        <p id="form-sub" class="step-sub"></p>
                    </div>
                </div>
                <form id="issuance-form" class="issuance-form">
                    <div id="form-fields"></div>
                    <div id="delivery-method" class="delivery-method hidden">
                        <span class="delivery-label">Delivery</span>
                        <div class="delivery-options">
                            <label class="delivery-option">
                                <input type="radio" name="delivery_method" value="screen" id="delivery-screen" checked>
                                <span class="delivery-pill">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                                    Screen
                                </span>
                            </label>
                            <label class="delivery-option">
                                <input type="radio" name="delivery_method" value="email" id="delivery-email">
                                <span class="delivery-pill">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                                    Email
                                </span>
                            </label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <label class="checkbox-label">
                            <input type="checkbox" id="chk-tx-code">
                            <span>Require transaction code</span>
                        </label>
                        <button type="submit" class="btn btn-accent">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            Issue Credential
                        </button>
                    </div>
                </form>
            </div>

            <!-- Step 3: Result -->
            <div id="step-result" class="step hidden">
                <div class="step-header">
                    <div class="step-icon step-icon-success">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div>
                        <h2>Credential Offer Created</h2>
                        <p class="step-sub">Scan the QR code or use the deep link to accept in a wallet</p>
                    </div>
                </div>
                <div id="result-content" class="result-content"></div>
                <div class="result-actions">
                    <button id="btn-issue-another" class="btn btn-accent">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Issue Another
                    </button>
                </div>
            </div>
        </section>

        <!-- Tab: Records -->
        <section id="tab-records" class="hidden">
            <div class="records-toolbar">
                <h2>Issuance Records</h2>
            </div>
            <div id="records-table-wrap" class="table-wrap">
                <table class="table">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="id">ID</th>
                            <th>Subject</th>
                            <th class="sortable" data-sort="credential_type">Type</th>
                            <th class="sortable" data-sort="status">Status</th>
                            <th class="sortable active-sort" data-sort="created_at">Created <span class="sort-arrow">&#9660;</span></th>
                        </tr>
                    </thead>
                    <tbody id="records-body">
                        <tr><td colspan="5" class="empty-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="pagination" class="pagination">
                <button id="btn-prev" class="btn btn-sm" disabled>Prev</button>
                <span id="page-info" class="page-info"></span>
                <button id="btn-next" class="btn btn-sm" disabled>Next</button>
            </div>
        </section>
    </main>

    <!-- Record detail dialog -->
    <dialog id="record-dialog" class="record-dialog">
        <div class="dialog-header">
            <h3>Issuance Record</h3>
            <button id="btn-close-dialog" class="btn-icon" aria-label="Close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div id="dialog-content" class="dialog-content"></div>
    </dialog>

    <script src="app.js"></script>
</body>
</html>
