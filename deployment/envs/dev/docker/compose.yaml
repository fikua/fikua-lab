# Fikua Lab — VPS deployment
# Backend (pulled from DockerHub) + PostgreSQL

services:
  fikua-lab:
    image: ${DOCKER_REGISTRY:-oriolcanades}/fikua-lab:${FIKUA_VERSION:-latest}
    container_name: fikua-lab
    restart: unless-stopped
    environment:
      FIKUA_BASE_URL: https://issuer.lab.fikua.com
      FIKUA_PORT: "8080"
      FIKUA_DB_URL: jdbc:postgresql://fikua-lab-db:5432/fikua
      FIKUA_DB_USER: ${FIKUA_POSTGRES_USER:-fikua}
      FIKUA_DB_PASSWORD: ${FIKUA_POSTGRES_PASSWORD}
      FIKUA_CERTS_DIR: /app/certs
      FIKUA_MIGRATIONS_DIR: /app/migrations
      FIKUA_RESEND_API_KEY: ${FIKUA_RESEND_API_KEY:-}
      FIKUA_RESEND_FROM_EMAIL: ${FIKUA_RESEND_FROM_EMAIL:-onboarding@resend.dev}
    volumes:
      - lab-certs:/app/certs:ro
    ports:
      - "127.0.0.1:8090:8080"
    depends_on:
      fikua-lab-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  fikua-lab-db:
    image: postgres:17-alpine
    container_name: fikua-lab-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fikua
      POSTGRES_USER: ${FIKUA_POSTGRES_USER:-fikua}
      POSTGRES_PASSWORD: ${FIKUA_POSTGRES_PASSWORD}
    volumes:
      - lab-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FIKUA_POSTGRES_USER:-fikua}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

volumes:
  lab-pgdata:
  lab-certs:
