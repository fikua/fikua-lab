# Fikua Lab — nginx virtual hosts
# Place this at /etc/nginx/conf.d/lab-fikua.conf on the VPS

# =============================================================================
# Landing page — lab.fikua.com
# =============================================================================
server {
    listen 443 ssl http2;
    server_name lab.fikua.com;

    ssl_certificate /etc/letsencrypt/live/lab.fikua.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lab.fikua.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /404.html { root /opt/vps/frontends/lab/shared; internal; }
    location = /50x.html { root /opt/vps/frontends/lab/shared; internal; }

    # Shared assets (consent banner, error pages)
    location ^~ /shared/ {
        alias /opt/vps/frontends/lab/shared/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Landing page (static files)
    root /opt/vps/frontends/lab/landing;
    index index.html;

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8090/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static assets cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# =============================================================================
# Portal — portal.lab.fikua.com
# =============================================================================
server {
    listen 443 ssl http2;
    server_name portal.lab.fikua.com;

    ssl_certificate /etc/letsencrypt/live/lab.fikua.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lab.fikua.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /404.html { root /opt/vps/frontends/lab/shared; internal; }
    location = /50x.html { root /opt/vps/frontends/lab/shared; internal; }

    # Shared assets (consent banner, error pages)
    location ^~ /shared/ {
        alias /opt/vps/frontends/lab/shared/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Portal frontend (static files)
    root /opt/vps/frontends/lab/portal;
    index index.html;

    # SSE log stream (requires unbuffered proxy for real-time events)
    location = /admin/logs/stream {
        proxy_pass http://127.0.0.1:8090/admin/logs/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Admin API (profile management + logs)
    location /admin/ {
        proxy_pass http://127.0.0.1:8090/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8090/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # State reset
    location /reset {
        proxy_pass http://127.0.0.1:8090/reset;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static assets cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# =============================================================================
# Issuer — issuer.lab.fikua.com
# =============================================================================
server {
    listen 443 ssl http2;
    server_name issuer.lab.fikua.com;

    ssl_certificate /etc/letsencrypt/live/lab.fikua.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lab.fikua.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /404.html { root /opt/vps/frontends/lab/shared; internal; }
    location = /50x.html { root /opt/vps/frontends/lab/shared; internal; }

    # Shared assets (consent banner, error pages)
    location ^~ /shared/ {
        alias /opt/vps/frontends/lab/shared/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Issuer frontend (static files)
    root /opt/vps/frontends/lab/issuer;
    index index.html;

    # Well-known endpoints (OIDF conformance suite entry points)
    # CORS handled by Javalin backend (consistent preflight + response headers)
    location /.well-known/ {
        proxy_pass http://127.0.0.1:8090/.well-known/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OID4VCI Issuer API endpoints
    # CORS handled by Javalin backend
    location /oid4vci/v1/ {
        proxy_pass http://127.0.0.1:8090/oid4vci/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8090/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static assets cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# =============================================================================
# Certificate — cert.lab.fikua.com
# =============================================================================
server {
    listen 443 ssl http2;
    server_name cert.lab.fikua.com;

    ssl_certificate /etc/letsencrypt/live/lab.fikua.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lab.fikua.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Request client certificate (optional, no CA validation)
    ssl_verify_client optional_no_ca;

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /404.html { root /opt/vps/frontends/lab/shared; internal; }
    location = /50x.html { root /opt/vps/frontends/lab/shared; internal; }

    # Shared assets (consent banner, error pages)
    location ^~ /shared/ {
        alias /opt/vps/frontends/lab/shared/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Certificate enrollment frontend (static files)
    root /opt/vps/frontends/lab/cert;
    index index.html;

    # Endpoint that returns client certificate info via headers
    # (DN values can contain commas/quotes that break inline JSON)
    location = /cert-info {
        add_header X-Client-Verify $ssl_client_verify always;
        add_header X-Client-Subject $ssl_client_s_dn always;
        add_header X-Client-Issuer $ssl_client_i_dn always;
        add_header X-Client-Serial $ssl_client_serial always;
        add_header X-Client-Fingerprint $ssl_client_fingerprint always;
        add_header X-Client-Valid-From $ssl_client_v_start always;
        add_header X-Client-Valid-To $ssl_client_v_end always;
        add_header Access-Control-Expose-Headers "X-Client-Verify, X-Client-Subject, X-Client-Issuer, X-Client-Serial, X-Client-Fingerprint, X-Client-Valid-From, X-Client-Valid-To" always;
        return 204;
    }

    # Static assets cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# =============================================================================
# Wallet — wallet.lab.fikua.com
# =============================================================================
server {
    listen 443 ssl http2;
    server_name wallet.lab.fikua.com;

    ssl_certificate /etc/letsencrypt/live/lab.fikua.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lab.fikua.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /404.html { root /opt/vps/frontends/lab/shared; internal; }
    location = /50x.html { root /opt/vps/frontends/lab/shared; internal; }

    # Shared assets (consent banner, error pages)
    location ^~ /shared/ {
        alias /opt/vps/frontends/lab/shared/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Wallet frontend (Vite build output)
    root /opt/vps/frontends/lab/holder/dist;
    index index.html;

    # SPA fallback (auth code callback, deep links)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker must not be cached (update detection)
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # Well-known endpoints (issuer metadata discovery from wallet)
    location /.well-known/ {
        proxy_pass http://127.0.0.1:8090/.well-known/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Wallet API endpoints (OID4VCI client + OID4VP holder)
    location /oid4vci/ {
        proxy_pass http://127.0.0.1:8090/oid4vci/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /oid4vp/ {
        proxy_pass http://127.0.0.1:8090/oid4vp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

