# =============================================================================
# HTTP -> HTTPS redirects
# =============================================================================
server {
    listen 80;
    server_name lab.fikua.com portal.lab.fikua.com issuer.lab.fikua.com cert.lab.fikua.com wallet.lab.fikua.com verifier.lab.fikua.com identify.lab.fikua.com;
    return 301 https://$host$request_uri;
}
