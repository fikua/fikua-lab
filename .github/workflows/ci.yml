name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Test
        run: cd suite/backend && ./gradlew build

  integration-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Start services
        run: |
          docker compose -f suite/backend/compose.local.yaml up -d --build
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend is UP"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Backend did not start within 60s"
              docker compose -f suite/backend/compose.local.yaml logs --tail=50
              exit 1
            fi
            sleep 2
          done

      - name: Install k6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.55.0/k6-v0.55.0-linux-amd64.tar.gz \
            | tar xzf - --strip-components=1 -C /usr/local/bin k6-v0.55.0-linux-amd64/k6

      - name: Run integration tests
        run: k6 run suite/k6/tests/integration.js --env BASE_URL=http://localhost:8080 --env SUMMARY_FILE=k6-integration.json

      - name: Run security tests
        run: k6 run suite/k6/tests/security.js --env BASE_URL=http://localhost:8080 --env SUMMARY_FILE=k6-security.json

      - name: k6 Job Summary
        if: always()
        run: |
          node -e "
          const fs = require('fs');

          function summarize(file, title) {
            if (!fs.existsSync(file)) return '## ⚠️ ' + title + '\n\nSummary not available.\n\n';
            const s = JSON.parse(fs.readFileSync(file, 'utf8'));
            const m = s.metrics || {};

            const cv = (m.checks && m.checks.values) || {};
            const passed = cv.passes || 0;
            const failed = cv.fails || 0;
            const total = passed + failed;
            const rate = total > 0 ? ((passed / total) * 100).toFixed(0) : '?';
            const status = failed === 0 && total > 0 ? '✅' : '❌';

            const dur = (m.http_req_duration && m.http_req_duration.values) || {};
            const reqs = (m.http_reqs && m.http_reqs.values && m.http_reqs.values.count) || 0;

            let md = '## ' + status + ' ' + title + '\n\n';
            md += '| Metric | Value |\n|--------|-------|\n';
            md += '| Checks | ' + passed + '/' + total + ' (' + rate + '%) |\n';
            md += '| HTTP Requests | ' + reqs + ' |\n';
            md += '| Avg Response | ' + (dur.avg ? dur.avg.toFixed(1) + ' ms' : '-') + ' |\n';
            md += '| p95 Response | ' + (dur['p(95)'] ? dur['p(95)'].toFixed(1) + ' ms' : '-') + ' |\n';
            md += '| Max Response | ' + (dur.max ? dur.max.toFixed(1) + ' ms' : '-') + ' |\n\n';
            return md;
          }

          let output = '';
          output += summarize('k6-integration.json', 'k6 Integration Tests');
          output += summarize('k6-security.json', 'k6 Security Tests');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, output);
          "

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f suite/backend/compose.local.yaml logs --tail=100

      - name: Stop services
        if: always()
        run: docker compose -f suite/backend/compose.local.yaml down -v

  docker:
    needs: [build, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from build.gradle.kts
        id: version
        run: echo "VERSION=$(grep '^    version = ' suite/backend/build.gradle.kts | sed 's/.*\"\(.*\)\"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: suite/backend
          file: suite/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fikua-lab:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/fikua-lab:latest

  release:
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from build.gradle.kts
        id: version
        run: echo "VERSION=$(grep '^    version = ' suite/backend/build.gradle.kts | sed 's/.*\"\(.*\)\"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/{/^## \[$VERSION\]/d;/^## \[/d;p}" CHANGELOG.md)
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="v$VERSION"
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            --title "v$VERSION" \
            --notes-file release-notes.md \
            --latest \
            2>/dev/null || echo "Release $TAG already exists, skipping"
