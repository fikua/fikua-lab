name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Test
        run: cd suite/backend && ./gradlew build

  integration-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Start services
        run: |
          docker compose -f deployment/envs/local/compose.yaml up -d --build
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend is UP"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Backend did not start within 60s"
              docker compose -f deployment/envs/local/compose.yaml logs --tail=50
              exit 1
            fi
            sleep 2
          done

      - name: Install k6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.55.0/k6-v0.55.0-linux-amd64.tar.gz \
            | tar xzf - --strip-components=1 -C /usr/local/bin k6-v0.55.0-linux-amd64/k6

      - name: Run integration tests
        run: k6 run suite/k6/tests/integration.js --env BASE_URL=http://localhost:8080 --env SUMMARY_FILE=k6-integration.json

      - name: Run security tests
        run: k6 run suite/k6/tests/security.js --env BASE_URL=http://localhost:8080 --env SUMMARY_FILE=k6-security.json

      - name: k6 Job Summary
        if: always()
        run: |
          node -e "
          const fs = require('fs');

          function summarize(file, title) {
            if (!fs.existsSync(file)) return '## ⚠️ ' + title + '\n\nSummary not available.\n\n';
            const s = JSON.parse(fs.readFileSync(file, 'utf8'));
            const m = s.metrics || {};

            const cv = (m.checks && m.checks.values) || {};
            const passed = cv.passes || 0;
            const failed = cv.fails || 0;
            const total = passed + failed;
            const rate = total > 0 ? ((passed / total) * 100).toFixed(0) : '?';
            const status = failed === 0 && total > 0 ? '✅' : '❌';

            const dur = (m.http_req_duration && m.http_req_duration.values) || {};
            const reqs = (m.http_reqs && m.http_reqs.values && m.http_reqs.values.count) || 0;

            let md = '## ' + status + ' ' + title + '\n\n';
            md += '| Metric | Value |\n|--------|-------|\n';
            md += '| Checks | ' + passed + '/' + total + ' (' + rate + '%) |\n';
            md += '| HTTP Requests | ' + reqs + ' |\n';
            md += '| Avg Response | ' + (dur.avg ? dur.avg.toFixed(1) + ' ms' : '-') + ' |\n';
            md += '| p95 Response | ' + (dur['p(95)'] ? dur['p(95)'].toFixed(1) + ' ms' : '-') + ' |\n';
            md += '| Max Response | ' + (dur.max ? dur.max.toFixed(1) + ' ms' : '-') + ' |\n\n';
            return md;
          }

          let output = '';
          output += summarize('k6-integration.json', 'k6 Integration Tests');
          output += summarize('k6-security.json', 'k6 Security Tests');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, output);
          "

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f deployment/envs/local/compose.yaml logs --tail=100

      - name: Stop services
        if: always()
        run: docker compose -f deployment/envs/local/compose.yaml down -v

  docker:
    needs: [build, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from build.gradle.kts
        id: version
        run: echo "VERSION=$(grep '^    version = ' suite/backend/build.gradle.kts | sed 's/.*\"\(.*\)\"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: oriolcanades
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/Dockerfile
          push: true
          tags: |
            oriolcanades/fikua-lab:${{ steps.version.outputs.VERSION }}
            oriolcanades/fikua-lab:latest

  deploy:
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from build.gradle.kts
        id: version
        run: echo "VERSION=$(grep '^    version = ' suite/backend/build.gradle.kts | sed 's/.*\"\(.*\)\"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 49222 51.38.179.236 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload compose.yaml to VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 -p 49222 ubuntu@51.38.179.236 "sudo mkdir -p /opt/vps/lab && sudo chown ubuntu:ubuntu /opt/vps/lab"
          scp -i ~/.ssh/id_ed25519 -P 49222 \
            deployment/envs/dev/docker/compose.yaml \
            ubuntu@51.38.179.236:/opt/vps/lab/compose.yaml

      - name: Deploy to VPS
        env:
          FIKUA_RESEND_API_KEY: ${{ secrets.FIKUA_RESEND_API_KEY }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p 49222 ubuntu@51.38.179.236 "
            cd /opt/vps/lab

            # Ensure .env exists
            if [ ! -f '.env' ]; then
              cat > .env << ENVEOF
          DOCKER_REGISTRY=oriolcanades
          FIKUA_VERSION=${{ steps.version.outputs.VERSION }}
          FIKUA_POSTGRES_USER=fikua
          FIKUA_POSTGRES_PASSWORD=fikua_lab_\$(openssl rand -hex 8)
          ENVEOF
              echo '.env created'
            fi

            # Update version in .env
            sed -i 's/^FIKUA_VERSION=.*/FIKUA_VERSION=${{ steps.version.outputs.VERSION }}/' .env

            # Update Resend API key (value injected from GitHub Actions env)
            grep -q '^FIKUA_RESEND_API_KEY=' .env && sed -i '/^FIKUA_RESEND_API_KEY=/d' .env
            echo 'FIKUA_RESEND_API_KEY=${FIKUA_RESEND_API_KEY}' >> .env

            # Pull new image and restart
            sudo docker pull oriolcanades/fikua-lab:${{ steps.version.outputs.VERSION }}
            sudo docker compose --env-file .env -f compose.yaml up -d --force-recreate

            # Wait for health check
            echo 'Waiting for backend to start...'
            for i in {1..30}; do
              if curl -sf http://localhost:8090/health > /dev/null 2>&1; then
                echo 'Backend is UP'
                exit 0
              fi
              sleep 2
            done
            echo 'WARNING: Backend did not pass health check within 60s'
            sudo docker compose --env-file .env -f compose.yaml logs --tail=50 fikua-lab
            exit 1
          "


  release:
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from build.gradle.kts
        id: version
        run: echo "VERSION=$(grep '^    version = ' suite/backend/build.gradle.kts | sed 's/.*\"\(.*\)\"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/{/^## \[$VERSION\]/d;/^## \[/d;p}" CHANGELOG.md)
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TAG="v$VERSION"
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            --title "v$VERSION" \
            --notes-file release-notes.md \
            --latest \
            2>/dev/null || echo "Release $TAG already exists, skipping"
