# Fikua Lab — backend deployment
#
# Image: docker.io/oriolcanades/fikua-lab (published by the
# oriolcanades/fikua-lab repo on every push to main / tag).
#
# Source of truth for this file:
#   fikua-platform-iac/projects/fikua-lab/backend/compose.yaml
#
# Host path on the VPS: /opt/vps/projects/fikua-lab/backend/

services:
  fikua-lab:
    image: ${DOCKER_REGISTRY:-fikua}/fikua-lab:${FIKUA_VERSION:-latest}
    container_name: fikua-lab
    restart: unless-stopped
    environment:
      # All public URLs the backend hands out (in .well-known/, in
      # credential offers, in OAuth metadata, …) start with these prefixes.
      # After ADR 0008r1 every role lives under lab.fikua.com/<role>/.
      FIKUA_BASE_URL: https://lab.fikua.com/issuer
      FIKUA_VERIFIER_BASE_URL: https://lab.fikua.com/verifier
      # Identify lives under the issuer prefix (see ADR 0008r1 v3).
      FIKUA_IDENTIFY_BASE_URL: https://lab.fikua.com/issuer/identify
      FIKUA_ROLES: issuer,verifier,trustlist,wallet-provider
      FIKUA_PORT: "8080"
      FIKUA_DB_URL: jdbc:postgresql://fikua-lab-db:5432/fikua
      FIKUA_DB_USER: ${FIKUA_POSTGRES_USER:-fikua}
      FIKUA_DB_PASSWORD: ${FIKUA_POSTGRES_PASSWORD}
      FIKUA_CERTS_DIR: /app/certs
      FIKUA_MIGRATIONS_DIR: /app/migrations
      FIKUA_RESEND_API_KEY: ${FIKUA_RESEND_API_KEY:-}
      FIKUA_RESEND_FROM_EMAIL: ${FIKUA_RESEND_FROM_EMAIL:-onboarding@resend.dev}
      # Switches logback.xml to JSON output (see comment on OTEL_LOGS_EXPORTER
      # below) — wasn't set before, so prod has been logging plain text.
      FIKUA_ENV: production
      # otel-collector lives in platform-services/compose.yaml, reachable
      # over traefik-public — this service joins that network below just
      # for this, it doesn't take a Traefik label. Routes to the
      # "fikua-digital-identity-lab" OpenObserve organization by matching
      # on OTEL_SERVICE_NAME (see platform-services/otel-collector/config.yaml).
      # 4318 = OTLP/HTTP (the Java agent's default protocol).
      # logback.xml now emits JSON in production (FIKUA_ENV=production) —
      # the javaagent auto-instruments Logback and forwards it via OTLP,
      # so logs export turns on too (was "none" before that existed).
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-otlp}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-otlp}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_SERVICE_NAME: fikua-lab
      # Without this, the log auto-instrumentation only captures the log
      # message text — the StructuredArguments.kv("event", ...) fields
      # used by the business events in IssuanceService/VerificationService
      # are silently dropped, not forwarded as separate attributes.
      OTEL_INSTRUMENTATION_LOGBACK_APPENDER_EXPERIMENTAL_CAPTURE_LOGSTASH_STRUCTURED_ARGUMENTS: "true"
    volumes:
      # Host bind-mount (same pattern as the DSS sibling). The signing
      # cert + key live on the host at ./certs/ and are mounted read-only.
      # PemKeyLoader reads issuer-cert.pem + issuer-key.pem (issuer role) and
      # verifier-cert.pem + verifier-key.pem (verifier role) from here; when
      # present it signs with them instead of an ephemeral key. The active
      # certs are eIDAS e-Seal chains (CA-signed leaf, root excluded from
      # x5c) so the issuer signs credentials and the verifier signs its JAR
      # request object with a HAIP-conformant cert.
      - ./certs:/app/certs:ro
    # 127.0.0.1:8090 stays bound so cloudflared (host process) can reach
    # the backend via http://127.0.0.1:8090 — the Tunnel ingress for
    # lab-backend.fikua.com points here. Also handy for debugging from
    # the VPS shell.
    ports:
      - "127.0.0.1:8090:8080"
    depends_on:
      fikua-lab-db:
        condition: service_healthy
    # No Traefik labels: the backend is no longer reachable through a
    # public hostname on Traefik. Cloudflare reaches it through the
    # fikua-vps Tunnel (Access Service Auth protected). Still joins
    # traefik-public — that's the shared fabric otel-collector lives on
    # too, unrelated to Traefik routing.
    networks:
      - default
      - traefik-public
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  fikua-lab-db:
    image: postgres:17-alpine
    container_name: fikua-lab-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fikua
      POSTGRES_USER: ${FIKUA_POSTGRES_USER:-fikua}
      POSTGRES_PASSWORD: ${FIKUA_POSTGRES_PASSWORD}
    volumes:
      - lab-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FIKUA_POSTGRES_USER:-fikua}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

volumes:
  # External volume with a fixed name so the deployment is decoupled from
  # the compose project name (i.e. the host directory). Pre-create it with:
  #   docker volume create fikua-lab-pgdata
  #
  # Certs are NOT a named volume anymore: they are a host bind-mount (./certs)
  # so the signing certs/keys are visible and swappable on disk, like the DSS.
  # When migrating from the old fikua-lab-certs volume, copy its contents out:
  #   docker run --rm -v fikua-lab-certs:/from -v "$PWD/certs":/to \
  #     alpine cp -a /from/. /to/
  lab-pgdata:
    name: fikua-lab-pgdata
    external: true

networks:
  # Shared L7/telemetry fabric defined by platform-services — joined
  # only to reach otel-collector, not for Traefik routing (see comment
  # on fikua-lab's networks: above).
  traefik-public:
    name: traefik-public
    external: true
